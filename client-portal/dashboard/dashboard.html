<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Meridian Wealth Advisors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/portal.css">
</head>
<body class="portal">

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="logo">Meridian<span class="gold">.</span></span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link active">
        <span class="sidebar-icon">&#9632;</span> Dashboard
      </a>
      <a href="../portfolio/portfolio.html" class="sidebar-link">
        <span class="sidebar-icon">&#9650;</span> Portfolio
      </a>
      <a href="../financial-plan/plan.html" class="sidebar-link">
        <span class="sidebar-icon">&#9679;</span> Financial Plan
      </a>
      <a href="../documents/documents.html" class="sidebar-link">
        <span class="sidebar-icon">&#9744;</span> Documents
      </a>
      <a href="../communication/messages.html" class="sidebar-link">
        <span class="sidebar-icon">&#9993;</span> Messages
      </a>
      <a href="../settings/settings.html" class="sidebar-link">
        <span class="sidebar-icon">&#9881;</span> Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" class="sidebar-link">Log Out</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="portal-main">
    <header class="portal-header">
      <div>
        <h1 class="portal-greeting">Good morning, <span id="client-name">Client</span></h1>
        <p class="portal-subtitle">Here's your financial snapshot</p>
      </div>
      <div class="portal-actions">
        <button class="btn btn--outline btn--sm">Message Advisor</button>
        <button class="btn btn--primary btn--sm">Schedule Meeting</button>
      </div>
    </header>

    <!-- Net Worth Summary -->
    <section class="dashboard-grid">
      <div class="metric-card metric-card--highlight">
        <span class="metric-label">Net Worth</span>
        <span class="metric-value" id="net-worth">--</span>
        <span class="metric-change positive" id="net-worth-change">--</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Portfolio Value</span>
        <span class="metric-value" id="portfolio-value">--</span>
        <span class="metric-change" id="portfolio-change">--</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">YTD Return</span>
        <span class="metric-value" id="ytd-return">--</span>
        <span class="metric-sublabel">vs. Benchmark: <span id="benchmark-return">--</span></span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Retirement Readiness</span>
        <span class="metric-value" id="retirement-score">--</span>
        <span class="metric-sublabel">On track</span>
      </div>
    </section>

    <!-- Goals & Activity -->
    <section class="dashboard-columns">
      <div class="panel">
        <h2 class="panel-title">Goal Progress</h2>
        <div id="goals-container">
          <!-- Populated dynamically from API -->
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">Recent Activity</h2>
        <ul class="activity-feed" id="activity-feed">
          <!-- Populated dynamically from API -->
        </ul>
      </div>
    </section>

    <!-- Action Items -->
    <section class="panel">
      <h2 class="panel-title">Action Items</h2>
      <div class="action-items" id="action-items">
        <!-- Populated dynamically from API -->
      </div>
    </section>
  </main>

  <script type="module" src="dashboard-app.js"></script>
  <script type="module" src="../assets/js/ai-chat.js"></script>
</body>
</html>
