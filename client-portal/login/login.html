<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Meridian Wealth Advisors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-brand">
      <div class="logo">Meridian<span class="gold">.</span></div>
      <p class="tagline">Wealth Advisors &mdash; Client Portal</p>
    </div>

    <div class="login-card">
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to your client portal</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>

        <p class="form-error" id="login-error"></p>

        <button class="login-btn" type="submit" id="login-btn">Sign In</button>
      </form>

      <div class="login-footer">
        <a href="#">Forgot your password?</a>
      </div>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
